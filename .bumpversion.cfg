[bumpversion]
current_version = 0.1.2
parse = (?P<major>\d+)\.(?P<minor>\d+)\.(?P<patch>\d+)(?:\-(?P<release>beta)\.(?P<num>\d+))?
serialize =
	{major}.{minor}.{patch}-{release}.{num}
	{major}.{minor}.{patch}
commit = False
tag = False

[bumpversion:file:./GitVersion.yml]

[bumpversion:file:./pyproject.toml]
search = name = "owi-metadatabase"
	version = "{current_version}"
replace = name = "owi-metadatabase"
	version = "{new_version}"

[bumpversion:file:./uv.lock]
search = name = "owi-metadatabase"
	version = "{current_version}"
replace = name = "owi-metadatabase"
	version = "{new_version}"

[bumpversion:file:./src/owi/metadatabase/_version.py]
search = __version__ = "{current_version}"
replace = __version__ = "{new_version}"

[bumpversion:file:./tests/test_imports.py]

[bumpversion:file:./tests/test_namespace.py]

[bumpversion:file:./docs/getting-started/installation.md]
