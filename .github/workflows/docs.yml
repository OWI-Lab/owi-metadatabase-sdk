name: Documentation

on:
  workflow_call:
    inputs:
      target_ref:
        description: Git ref to checkout for documentation publishing.
        required: false
        type: string
      docs_version:
        description: Documentation version to publish.
        required: false
        type: string
        default: dev
      docs_alias:
        description: Documentation alias to publish.
        required: false
        type: string
        default: dev
      set_default:
        description: Whether to set the published version as the default docs version.
        required: false
        type: boolean
        default: true
  workflow_dispatch:
    inputs:
      target_ref:
        description: Git ref to checkout for documentation publishing.
        required: false
        type: string
        default: main
      docs_version:
        description: Documentation version to publish.
        required: false
        type: string
        default: dev
      docs_alias:
        description: Documentation alias to publish.
        required: false
        type: string
        default: dev
      set_default:
        description: Whether to set the published version as the default docs version.
        required: false
        type: boolean
        default: true

concurrency:
  group: docs-${{ inputs.docs_version || github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.target_ref || github.event.inputs.target_ref || github.ref_name }}
          fetch-depth: 0
      - name: Set up Python "3.14"
        uses: actions/setup-python@v5
        with:
          python-version: "3.14"
      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.14"
          enable-cache: true
      - name: Install dependencies
        run: uv sync --dev
      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
      - name: Resolve docs publication arguments
        id: docs_args
        env:
          INPUT_DOCS_VERSION: ${{ inputs.docs_version || github.event.inputs.docs_version || 'dev' }}
          INPUT_DOCS_ALIAS: ${{ inputs.docs_alias || github.event.inputs.docs_alias || 'dev' }}
        run: |
          echo "version=${INPUT_DOCS_VERSION#v}" >> "$GITHUB_OUTPUT"
          echo "alias=${INPUT_DOCS_ALIAS#v}" >> "$GITHUB_OUTPUT"
      - name: Deploy versioned docs with mike
        run: |
          uv run invoke docs.deploy-version \
            --version "${{ steps.docs_args.outputs.version }}" \
            --alias "${{ steps.docs_args.outputs.alias }}"
      - name: Set default docs version
        if: ${{ inputs.set_default || github.event.inputs.set_default == 'true' }}
        run: |
          uv run invoke docs.set-default-version \
            --version "${{ steps.docs_args.outputs.version }}"
