[project]
site_name = "OWI Metadatabase SDK"
site_description = "Core SDK for OWI-Lab metadatabase geometry and location data"
site_author = "Pietro D'Antuono"
site_url = "https://owi-lab.github.io/owi-metadatabase-sdk/"
repo_url = "https://github.com/OWI-Lab/owi-metadatabase-sdk"
repo_name = "OWI-Lab/owi-metadatabase-sdk"
edit_uri = "edit/main/docs/"
docs_dir = "docs"
site_dir = "site"

nav = [
  { "Home" = "index.md" },
  { "Tutorials" = [
      { "Overview" = "tutorials/index.md" },
      { "Your First API Query" = "tutorials/first-query.md" },
      { "Processing Turbine Geometry" = "tutorials/processing-geometry.md" },
  ]},
  { "How-to Guides" = [
      { "Overview" = "how-to/index.md" },
      { "Install the SDK" = "how-to/install.md" },
      { "Authenticate" = "how-to/authenticate.md" },
      { "Query Location Data" = "how-to/query-locations.md" },
      { "Query Geometry Data" = "how-to/query-geometry.md" },
      { "Process a Single Turbine" = "how-to/process-single-turbine.md" },
      { "Process Multiple Turbines" = "how-to/process-multiple-turbines.md" },
      { "Filter Data" = "how-to/filter-data.md" },
      { "Migrate from v0.10.x" = "how-to/migrate.md" },
  ]},
  { "Reference" = [
      { "Overview" = "reference/index.md" },
      { "I/O Module" = "reference/api/io.md" },
      { "Geometry" = "reference/api/geometry.md" },
      { "Locations" = "reference/api/locations.md" },
      { "Utilities" = "reference/api/utils.md" },
      { "Geometry Queries" = "reference/query-examples/geometry.md" },
      { "Location Queries" = "reference/query-examples/locations.md" },
  ]},
  { "Explanation" = [
      { "Overview" = "explanation/index.md" },
      { "Architecture" = "explanation/architecture.md" },
      { "Namespace Packages" = "explanation/namespace-packages.md" },
      { "Data Model" = "explanation/data-model.md" },
  ]},
  { "Development" = [
      { "Contributing" = "development/contributing.md" },
      { "Testing" = "development/testing.md" },
      { "Documentation" = "development/documentation.md" },
      { "Doctest Guide" = "development/doctest_guide.md" },
      { "Release Process" = "development/release.md" },
      { "CI/CD" = "development/cicd.md" },
  ]},
  { "About" = [
      { "License" = "about/license.md" },
      { "Changelog" = "about/changelog.md" },
      { "Authors" = "about/authors.md" },
  ]},
]

[project.theme]
variant = "modern"
font.text = "Barlow"
font.code = "Google Sans Code"
logo = "assets/LogoOWI.png"
favicon = "assets/favicon.png"
language = "en"
features = [
    "navigation.instant",
    "navigation.tracking",
    "navigation.tabs",
    "navigation.sections",
    "navigation.expand",
    "navigation.top",
    "navigation.footer",
    "toc.follow",
    # "toc.integrate",
    "search.suggest",
    "search.highlight",
    "search.share",
    "content.code.copy",
    "content.code.annotate",
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
primary = "indigo"
accent = "indigo"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/OWI-Lab"

[[project.extra.social]]
icon = "fontawesome/brands/python"
link = "https://pypi.org/project/owi-metadatabase/"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/company/owi-lab/"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]

[project.plugins.mkdocstrings.handlers.python.options]
docstring_style = "numpy"
show_source = true
show_root_heading = true
show_root_full_path = false
show_object_full_path = false
show_category_heading = true
show_if_no_docstring = false
inherited_members = true
members_order = "source"
separate_signature = true
unwrap_annotated = true
merge_init_into_class = true
docstring_section_style = "table"
signature_crossrefs = true

[project.markdown_extensions.admonition]

[project.markdown_extensions.pymdownx.details]

[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" },
]

[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true

[project.markdown_extensions.pymdownx.inlinehilite]

[project.markdown_extensions.pymdownx.snippets]

[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true

[project.markdown_extensions.pymdownx.arithmatex]
generic = true

[project.markdown_extensions.attr_list]

[project.markdown_extensions.md_in_html]

[project.markdown_extensions.tables]

[project.markdown_extensions.footnotes]

[project.markdown_extensions.toc]
permalink = true

[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"
